cursor_shape beam

map ctrl+h send_text all \x1b[D  
map ctrl+j send_text all \x1b[B  
map ctrl+k send_text all \x1b[A  
map ctrl+l send_text all \x1b[C  

foreground         #c4c6c5
background         #161e18
background_opacity 1.0
cursor             #c4c6c5

active_tab_foreground     #161e18
active_tab_background     #c4c6c5
inactive_tab_foreground   #c4c6c5
inactive_tab_background   #161e18

active_border_color   #c4c6c5
inactive_border_color #161e18
bell_border_color     #2B5E89


font_family      monospace
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11
disable_ligatures   always


background_opacity 0.7

color0   #0d0d20   
color8   #7a7a99   

color1   #b24ca6    
color9   #e17fff   

color6   #4fc3dc
color14  #80eaff    

color3   #a68bff   
color11  #c8b6ff   

color4   #897292   
color12  #cfa7ff   

color5   #b46abf   
color13  #ff9cff  

color2   #5ac38b   
color10  #85e5b1   

color7   #c2c2c7   
color15  #f0f0f7   

map ctrl+shift+h previous_tab
map ctrl+shift+l next_tab
